name: Build WindowLayout

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'window_layout.py'
      - 'setup.py'
      - 'gen_icon.py'
      - 'entitlements.plist'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyobjc py2app setuptools Pillow

      - name: Generate app icon
        run: python3 gen_icon.py

      - name: Build app
        run: python3 setup.py py2app

      # TODO: Legg til signing og notarization når Apple Developer-sertifikat er konfigurert i GitHub Secrets:
      # MACOS_CERTIFICATE, MACOS_CERTIFICATE_PWD, KEYCHAIN_PASSWORD, APPLE_SIGN_IDENTITY,
      # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID

      - name: Create distribution ZIP
        run: |
          cd dist
          ditto -c -k --keepParent "WindowLayout.app" "WindowLayout.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: WindowLayout-mac
          path: dist/WindowLayout.zip

  release:
    needs: build-mac
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/WindowLayout-mac/WindowLayout.zip
          generate_release_notes: true
